# AeroSpace - Tiling Window Manager
# https://nikitabobko.github.io/AeroSpace/

# ----------------------------------------
# General
# ----------------------------------------
start-at-login = true
after-login-command = []
after-startup-command = []

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Mouse
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Layout
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# 壁紙切替
exec-on-workspace-change = ['/bin/bash', '-c', '$HOME/.config/aerospace/wallpaper.sh']

# Gaps
[gaps]
inner.horizontal = 5
inner.vertical = 5
outer.left = 5
outer.bottom = 5
outer.top = 5
outer.right = 5

# ----------------------------------------
# Key bindings
# ----------------------------------------
[mode.main.binding]

# -- Workspace switch: Alt+1~5 --
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'

# -- Move window to workspace (and follow): Alt+Shift+1~5 --
alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
alt-shift-5 = ['move-node-to-workspace 5', 'workspace 5']

# -- Tiling: Alt+HJKL (focus) --
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# -- Move window within layout: Alt+Shift+HJKL --
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# -- Resize: Alt+Ctrl+HJKL --
alt-ctrl-h = 'resize width -50'
alt-ctrl-j = 'resize height +50'
alt-ctrl-k = 'resize height -50'
alt-ctrl-l = 'resize width +50'

# -- Fullscreen: Alt+; --
alt-semicolon = 'fullscreen'

# -- Move to next display: Alt+S --
alt-s = 'move-node-to-monitor next'

# -- Move to main display: Alt+A --
alt-a = 'move-node-to-monitor main'

# -- Layout toggle: Alt+/ --
alt-slash = 'layout tiles horizontal vertical'

# -- Float toggle: Alt+Shift+F --
alt-shift-f = 'layout floating tiling'

# -- Join orientation: Alt+E (horizontal) / Alt+W (vertical) --
alt-e = 'join-with right'
alt-w = 'join-with down'

# ----------------------------------------
# Window rules
# ----------------------------------------
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'
